{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="container-fluid">
        <div class="row" style="height: 100vh; background-color:rgb(255, 128, 0);">
            <div class="col-sm-4 mx-auto my-auto">
                <div class="card">
                    <div class="text-center">
                        <img src="{% static 'img/logo.png' %}" alt="" height="80px">
                    </div>
                    <h4 class="text-center">Welcome Admin</h4>
                    {% if messages %}
                    {% for m in messages %}
                    <div class="alert alert-warning alert-dismissible fade show" role="alert">
                        {{m}}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endfor %}
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}

                        <div class="form-floating mb-3 ms-3 me-3">
                            <input type="text" name="username" class="form-control" id="floatingInput"
                                placeholder="name">
                            <label for="floatingInput">User Name</label>
                        </div>
                        <div class="form-floating ms-3 me-3">
                            <input type="password" name="password" class="form-control" id="floatingPassword"
                                placeholder="Password">
                            <label for="floatingPassword">Password</label>
                        </div>

                        <button type="submit" class="btn btn-warning mt-4 w-50 ms-5">Login</button>
                        <p class="mt-5 ms-3">&copy;SmartBuildHub <a href="" class=" me-3 float-end fw-semibold">Back to
                                Home</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="{% static 'js/bootstrap.bundle.js' %}"></script>
</body>

</html>
